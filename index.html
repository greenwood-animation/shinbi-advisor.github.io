<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Unity Web Player | shinbi-advisor</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        background: #000;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #unity-container {
        position: relative;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #unity-canvas {
        display: block;
        width: 1920px;
        height: 1080px;
      }
      #unity-loading-bar {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        z-index: 10;
      }
      #unity-footer {
        position: absolute;
        bottom: 4px; right: 8px;
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #unity-fullscreen-button {
        cursor: pointer;
        width: 28px; height: 28px;
        opacity: 0.7;
      }
      #unity-fullscreen-button:hover { opacity: 1; }
      #rotate-hint {
        display: none;
        position: fixed;
        inset: 0;
        background: #000;
        color: #fff;
        font-size: 20px;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        z-index: 9999;
        text-align: center;
        font-family: sans-serif;
      }
      #rotate-hint .icon { font-size: 52px; }
    </style>
  </head>
  <body>
    <div id="rotate-hint">
      <div class="icon">↺</div>
      기기를 가로로 돌려주세요
    </div>

    <div id="unity-container">
      <canvas id="unity-canvas" width="1920" height="1080"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"></div>
      <div id="unity-footer">
        <div id="unity-build-title">shinbi-advisor</div>
        <div id="unity-fullscreen-button"></div>
      </div>
    </div>

    <script>
      var canvas    = document.querySelector("#unity-canvas");
      var container = document.querySelector("#unity-container");
      var isMobile  = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

      var BASE_W = 1920;
      var BASE_H = 1080;

      function resize() {
        var W = window.innerWidth;
        var H = window.innerHeight;
        var scale = Math.min(W / BASE_W, H / BASE_H);
        var displayW = Math.round(BASE_W * scale);
        var displayH = Math.round(BASE_H * scale);
        canvas.style.width  = displayW + "px";
        canvas.style.height = displayH + "px";
        container.style.width  = displayW + "px";
        container.style.height = displayH + "px";
      }
      resize();
      window.addEventListener('resize', resize);

      var rotateHint = document.querySelector("#rotate-hint");
      function checkRotate() {
        if (!isMobile) return;
        var isPortrait   = window.innerHeight > window.innerWidth;
        var isFullscreen = !!(document.fullscreenElement || document.webkitFullscreenElement);
        rotateHint.style.display = (isFullscreen && isPortrait) ? "flex" : "none";
      }
      window.addEventListener('resize', checkRotate);
      document.addEventListener('fullscreenchange',       function() { resize(); checkRotate(); });
      document.addEventListener('webkitfullscreenchange', function() { resize(); checkRotate(); });

      function unityShowBanner(msg, type) {
        var w = document.querySelector("#unity-warning");
        var d = document.createElement('div');
        d.innerHTML = msg;
        if (type == 'error') d.style.cssText = 'background:red;padding:10px;';
        else if (type == 'warning') d.style.cssText = 'background:yellow;padding:10px;';
        w.appendChild(d);
        w.style.display = 'block';
        if (type != 'error') setTimeout(function() {
          w.removeChild(d);
          if (!w.children.length) w.style.display = 'none';
        }, 5000);
      }

      var buildUrl  = "Build";
      var loaderUrl = buildUrl + "/build.loader.js";
      var config = {
          dataUrl:      buildUrl + "/build.data",
          frameworkUrl: buildUrl + "/build.framework.js",
          codeUrl:      buildUrl + "/build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName:        "DefaultCompany",
        productName:        "shinbi-advisor",
        productVersion:     "1.0",
        showBanner:         unityShowBanner,
        matchWebGLToCanvasSize: false,
      };

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          document.querySelector("#unity-loading-bar").style.display = "none";

          document.querySelector("#unity-fullscreen-button").onclick = () => {
            if (isMobile) {
              var el  = document.documentElement;
              var req = el.requestFullscreen || el.webkitRequestFullscreen;
              if (req) req.call(el).then(() => {
                if (screen.orientation && screen.orientation.lock)
                  screen.orientation.lock('landscape').catch(() => {});
              }).catch(() => {});
            } else {
              unityInstance.SetFullscreen(1);
            }
          };

        }).catch((msg) => alert(msg));
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
