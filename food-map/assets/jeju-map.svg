<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="sea" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#bfeafb"/>
      <stop offset="100%" stop-color="#6fc3e8"/>
    </radialGradient>
    <radialGradient id="land" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#d9f0c8"/>
      <stop offset="100%" stop-color="#a9d68b"/>
    </radialGradient>
  </defs>

  <!-- 바다 -->
  <rect width="600" height="400" fill="url(#sea)"/>
  <!-- 잔물결 -->
  <g fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="2">
    <path d="M40 70 q15 -8 30 0 t30 0"/>
    <path d="M460 90 q15 -8 30 0 t30 0"/>
    <path d="M70 330 q15 -8 30 0 t30 0"/>
    <path d="M440 340 q15 -8 30 0 t30 0"/>
  </g>

  <!-- 제주 섬 (단순화한 타원형) -->
  <path d="M120 210
           C 120 150, 220 120, 300 122
           C 400 124, 490 150, 488 205
           C 486 255, 400 290, 300 288
           C 210 286, 120 270, 120 210 Z"
        fill="url(#land)" stroke="#86bd66" stroke-width="3"/>

  <!-- 한라산 -->
  <path d="M270 215 L300 165 L330 215 Z" fill="#cde6b3" stroke="#86bd66" stroke-width="2"/>
  <path d="M288 188 L300 165 L312 188 Z" fill="#ffffff" stroke="#cde6b3" stroke-width="1"/>

  <text x="300" y="320" text-anchor="middle" font-family="sans-serif" font-size="20"
        font-weight="700" fill="#5b8f3f" opacity="0.7">제 주 도</text>
</svg>
