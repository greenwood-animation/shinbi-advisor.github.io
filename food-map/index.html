<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>신비할망의 바당 맛 지도</title>
  <link rel="stylesheet" href="style.css?v=8" />
</head>
<body>
  <div id="app">

    <!-- ── 1단계: 메뉴 그리드 ─────────────────────────── -->
    <section id="screen-menu" class="screen is-active">
      <header class="menu-head">
        <h1 class="title"><span class="brand">신비할망</span>의 바당 맛 지도</h1>
      </header>
      <div class="menu-grid" id="menuGrid"></div>
    </section>

    <!-- ── 2단계: 제주 지도 + 핀 ──────────────────────── -->
    <section id="screen-map" class="screen">
      <button class="back-btn" data-back="menu">← 메뉴로</button>
      <div class="map-head">
        <h2 class="map-title" id="mapMenuName"></h2>
      </div>
      <div class="map-wrap" id="mapWrap">
        <!-- 제주 일러스트 지도 (SVG 플레이스홀더, 나중에 이미지로 교체 가능) -->
        <img class="map-bg" id="mapBg" src="assets/jeju-map.svg" alt="제주 지도" />
        <div class="pins" id="pins"></div>
        <p class="map-empty" id="mapEmpty" hidden>아직 등록된 식당이 없어요 🐚</p>
      </div>
    </section>

    <!-- ── 3단계: 식당 상세 패널 ──────────────────────── -->
    <aside id="detailPanel" class="detail-panel">
      <button class="detail-close" id="detailClose">×</button>
      <div class="detail-body" id="detailBody"></div>
    </aside>
    <div id="overlay" class="overlay"></div>

    <!-- ── 순덕(신비할망) 캐릭터 + 말풍선 ──────────────── -->
    <div id="charStage" class="char-stage">
      <div class="speech-bubble" id="speechBubble"><span id="speechText"></span></div>
      <div class="char-img" id="charImg"></div>
    </div>

  </div>
  <script src="app.js?v=8"></script>
</body>
</html>
